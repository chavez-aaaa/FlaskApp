{% extends 'base.html' %}
{% block title %}Cursos{% endblock %}
{% block content %}
<div class="mt-4">
    <h2>Gestión de Cursos</h2>
    <!-- BOTÓN CREAR -->
    <a href="/cursos/nuevo" class="btn btn-primary mb-3">Nuevo Curso</a>
    <table class="table table-bordered">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Acciones</th>
        </tr>
        {% for c in cursos %}
        <tr>
            <td>{{ c.id }}</td>
            <td>{{ c.nombre }}</td>
            <td>{{ c.descripcion }}</td>
            <td>
            <!-- BOTONES CRUD -->

            <a href="/cursos/editar/{{ c.id }}" class="btn btn-warning btn-
            sm">Editar</a>

            <a href="/cursos/eliminar/{{ c.id }}" class="btn btn-danger
            btn-sm"
            onclick="return confirm('¿Eliminar curso?')">
            Eliminar
            </a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
